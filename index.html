<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | متجر شحن الألعاب</title>
    
    <style>
        :root {
            --primary-color: #00f2ff; /* لون النيون الأزرق */
            --secondary-color: #7000ff; /* لون البنفسجي */
            --bg-dark: #0a0b10;
            --card-bg: rgba(20, 22, 30, 0.95);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 242, 255, 0.15) 0%, transparent 40%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .login-container {
            position: relative;
            width: 400px;
            padding: 40px;
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        /* تأثير الخط المضيء العلوي */
        .login-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--secondary-color), var(--primary-color));
            border-radius: 20px 20px 0 0;
        }

        h2 {
            margin-bottom: 10px;
            font-size: 28px;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        input {
            width: 100%;
            padding: 14px;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 16px;
            transition: 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, var(--secondary-color), var(--primary-color));
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-btn:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 20px rgba(112, 0, 255, 0.4);
            transform: translateY(-2px);
        }

        .footer-links {
            margin-top: 25px;
            font-size: 13px;
            color: #aaa;
        }

        .footer-links a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        /* أنيميشن بسيط للخلفية */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>منطقة اللاعبين</h2>
        <p class="subtitle">اشحن جواهرك وانطلق للقمة 🚀</p>
        
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" placeholder="اسم المستخدم أو البريد" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="كلمة المرور" required>
            </div>
            
            <button type="submit" class="login-btn">دخول السيرفر</button>
            
            <div class="footer-links">
                <span>ليس لديك حساب؟ <a href="#">إنشاء حساب جديد</a></span>
                <br><br>
                <a href="#" style="color: #666; font-weight: normal;">نسيت كلمة المرور؟</a>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // مثال بسيط للتحقق
            if(user.length > 3 && pass.length > 3) {
                alert("جاري الاتصال بالسيرفر... أهلاً بك يا " + user);
                // هنا يمكنك توجيه المستخدم لصفحة المتجر الرئيسية
                // window.location.href = "home.html";
            } else {
                alert("يرجى إدخال بيانات صحيحة!");
            }
        });
    </script>

</body>
</html>
