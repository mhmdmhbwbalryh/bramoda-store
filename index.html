<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز شحن الألعاب المعتمد | Gaming Recharge Pro</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #7000ff;
            --dark-bg: #050505;
            --card-bg: #151515;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: white;
            overflow-x: hidden;
        }

        /* شاشة تسجيل الدخول */
        #login-screen {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%);
        }

        .login-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        /* واجهة العروض (مخفية في البداية) */
        #store-screen {
            display: none;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        h1, h2 { color: var(--neon-blue); text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }

        .input-group { margin-bottom: 20px; }

        input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            outline: none;
        }

        input:focus { border-color: var(--neon-blue); }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, var(--neon-purple), var(--neon-blue));
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover { transform: scale(1.02); box-shadow: 0 0 15px var(--neon-blue); }

        /* شبكة الألعاب */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid #333;
        }

        .game-card:hover {
            border-color: var(--neon-purple);
            transform: translateY(-5px);
        }

        .game-img {
            width: 100%;
            height: 150px;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            background-size: cover;
            background-position: center;
        }

        .game-info { padding: 15px; text-align: center; }

        /* نافذة العروض (Modal) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            border: 1px solid var(--neon-blue);
        }

        .offer-item {
            display: flex;
            justify-content: space-between;
            background: #222;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border-right: 4px solid var(--neon-blue);
        }

        .close-btn {
            background: red;
            color: white;
            padding: 5px 15px;
            border: none;
            border-radius: 5px;
            float: left;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2>تسجيل دخول الوكيل</h2>
            <p style="color: #888;">أدخل بيانات الاعتماد للوصول للعروض</p>
            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="user" placeholder="اسم المستخدم" required>
                </div>
                <div class="input-group">
                    <input type="password" id="pass" placeholder="كلمة المرور" required>
                </div>
                <button type="submit" class="btn">دخول النظام</button>
            </form>
        </div>
    </div>

    <div id="store-screen">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <h1>لوحة عروض الشحن 💎</h1>
            <span id="welcome-msg" style="color: var(--neon-blue);"></span>
        </header>
        
        <div class="games-grid">
            <div class="game-card" onclick="showOffers('Free Fire', ['100 جوهرة - 1$', '500 جوهرة - 4$', '1000 جوهرة - 8$'])">
                <div class="game-img" style="background-color: #e74c3c;">FREE FIRE</div>
                <div class="game-info"><h3>فري فاير</h3><p>شحن فوري بالـ ID</p></div>
            </div>
            <div class="game-card" onclick="showOffers('PUBG Mobile', ['60 UC - 1$', '325 UC - 5$', '660 UC - 10$'])">
                <div class="game-img" style="background-color: #f1c40f; color: black;">PUBG</div>
                <div class="game-info"><h3>ببجي موبايل</h3><p>شحن شدات معتمد</p></div>
            </div>
            <div class="game-card" onclick="showOffers('eFootball', ['100 Coins - 1.2$', '500 Coins - 5$', '1000 Coins - 9$'])">
                <div class="game-img" style="background-color: #2980b9;">eFootball</div>
                <div class="game-info"><h3>بيس موبايل</h3><p>شحن كوينز آمن</p></div>
            </div>
            <div class="game-card" onclick="showOffers('FC 24', ['500 Points - 4$', '1000 Points - 8$', '2800 Points - 20$'])">
                <div class="game-img" style="background-color: #27ae60;">FC 24 / FIFA</div>
                <div class="game-info"><h3>فيفا موبايل</h3><p>نقاط FC Points</p></div>
            </div>
        </div>
    </div>

    <div id="offerModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">العروض المتاحة</h2>
            <div id="offersList"></div>
            <button class="close-btn" onclick="closeModal()">إغلاق</button>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const userInput = document.getElementById('user').value;
            const passInput = document.getElementById('pass').value;

            // التحقق من البيانات المطلوبة
            if(userInput === "bramoda" && passInput === "8787") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('store-screen').style.display = 'block';
                document.getElementById('welcome-msg').innerText = "مرحباً، " + userInput;
            } else {
                alert("بيانات الدخول خاطئة! حاول مرة أخرى.");
            }
        });

        function showOffers(gameName, offers) {
            const modal = document.getElementById('offerModal');
            const list = document.getElementById('offersList');
            document.getElementById('modalTitle').innerText = "عروض " + gameName;
            
            list.innerHTML = '';
            offers.forEach(offer => {
                const div = document.createElement('div');
                div.className = 'offer-item';
                div.innerHTML = `<span>${offer}</span> <button class="btn" style="width: auto; padding: 5px 10px;">شراء</button>`;
                list.appendChild(div);
            });
            
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('offerModal').style.display = 'none';
        }
    </script>
</body>
</html>
